<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

  <!--
    PWA meta tags — these are what make it fullscreen when added to
    iPhone Home Screen. Do NOT remove these.
  -->
  <meta name="apple-mobile-web-app-capable"           content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style"  content="black-translucent" />
  <meta name="apple-mobile-web-app-title"             content="Dashboard" />
  <meta name="theme-color"                            content="#0A0A0F" id="theme-color-meta" />
  <meta name="mobile-web-app-capable"                 content="yes" />

  <title>Dashboard</title>

  <link rel="manifest"         href="manifest.json" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <link rel="icon"             href="icon-192.png" type="image/png" />

  <!--
    CSS load order matters:
    theme.css   → design tokens (CSS variables) — must load first
    layout.css  → grid, panels, controls
    ambient.css → fullscreen clock styles
    animations.css → transitions between states
    widgets.css → weather card and future widget styles
  -->
  <link rel="stylesheet" href="css/theme.css" />
  <link rel="stylesheet" href="css/layout.css" />
  <link rel="stylesheet" href="css/ambient.css" />
  <link rel="stylesheet" href="css/animations.css" />
  <link rel="stylesheet" href="css/widgets.css" />
</head>

<body>

  <!--
    ╔══════════════════════════════════╗
    ║   AMBIENT SCREEN (default)       ║
    ║   Fullscreen clock only.         ║
    ║   Tap anywhere to open dashboard.║
    ╚══════════════════════════════════╝
  -->
  <div id="ambient-screen" class="ambient-screen">

    <!-- AM / PM sits in the top-right corner, always -->
    <div id="ambient-ampm" class="ambient-ampm">AM</div>

    <!--
      Clock display.
      Landscape → "10 : 45" on one line (colon visible via CSS).
      Portrait  → "10" stacked over "45", colon hidden (user decision).
      CSS handles the switching automatically via orientation media query.
    -->
    <div class="ambient-clock">
      <span id="ambient-hours"   class="ambient-hours">10</span>
      <span                      class="ambient-colon">:</span>
      <span id="ambient-minutes" class="ambient-minutes">45</span>
    </div>

    <!-- Full date below the clock -->
    <div id="ambient-date" class="ambient-date">Friday, 06 June 2026</div>

    <!-- Subtle pulsing hint, appears after a few seconds -->
    <div class="ambient-hint">tap to expand</div>

  </div>


  <!--
    ╔══════════════════════════════════╗
    ║   ACTIVE DASHBOARD               ║
    ║   Hidden by default.             ║
    ║   Revealed when ambient is tapped║
    ╚══════════════════════════════════╝
  -->
  <div id="dashboard" class="dashboard">

    <!-- Theme toggle — fixed top-right, always accessible in active mode -->
    <div class="controls-bar">
      <button id="btn-theme" class="control-btn" aria-label="Toggle dark / light theme">
        <span id="theme-icon">☽</span>
      </button>
    </div>

    <!--
      LEFT PANEL — Clock
      58% of landscape width / full width on portrait top section.
    -->
    <div class="panel-left">

      <div class="clock-container">
        <!-- Time digits + AM/PM -->
        <div class="clock-time-row">
          <span id="active-time" class="clock-digits">10:45</span>
          <span id="active-ampm" class="clock-ampm">AM</span>
        </div>
        <!-- Date -->
        <div id="active-day"  class="clock-date clock-day">Friday</div>
        <div id="active-date" class="clock-date">06 June 2026</div>
      </div>

      <!-- 12h / 24h pill toggle — bottom of left panel -->
      <div class="clock-controls">
        <button id="btn-format" class="format-btn" aria-label="Toggle 12 or 24 hour format">
          <span id="fmt-12" class="fmt-option fmt-active">12h</span>
          <span id="fmt-24" class="fmt-option">24h</span>
        </button>
      </div>

    </div>


    <!--
      RIGHT PANEL — Widgets
      42% of landscape width / full remaining height on portrait.
    -->
    <div class="panel-right">

      <!--
        WEATHER WIDGET
        Populated by js/widgets/weather.js.
        Shows "Fetching weather…" until the first successful API call.
      -->
      <div id="widget-weather" class="widget">
        <div class="widget-loading">Fetching weather…</div>
      </div>

      <!--
        FUTURE WIDGET SLOT
        Placeholder — replace with a real widget when you're ready.
        To add: create js/widgets/yourwidget.js and a <script> tag below.
      -->
      <div class="widget widget-placeholder" aria-hidden="true">
        <div class="placeholder-inner">
          <span class="placeholder-plus">+</span>
          <span class="placeholder-label">future widget</span>
        </div>
      </div>

    </div>

  </div><!-- /dashboard -->


  <!--
    JS load order: config → theme → widgets → ambient → app
    config.js must always be first (everything imports from it).
    app.js must always be last (it calls everything else).
  -->
  <script src="js/config.js"></script>
  <script src="js/theme.js"></script>
  <script src="js/widgets/clock.js"></script>
  <script src="js/widgets/weather.js"></script>
  <script src="js/ambient.js"></script>
  <script src="js/app.js"></script>

</body>
</html>
